<!-- dereksleepfield.com — theme switcher widget
     Injected site-wide via `include-after-body` in _quarto.yml.
     CSS lives in themes.css; this file is markup + small script. -->
<div class="shelf-theme-switcher" id="shelfThemeSwitcher" aria-label="Style">
  <button type="button" class="shelf-theme-toggle" id="shelfThemeToggle" aria-haspopup="listbox" aria-expanded="false">
    <span class="shelf-swatch" id="shelfToggleSwatch" style="background:#fde487"></span>
    <span id="shelfToggleLabel">Star Chart</span>
    <span class="shelf-chevron">▾</span>
  </button>
  <div class="shelf-theme-panel" id="shelfThemePanel" role="listbox"></div>
</div>

<script>
(function () {
  var THEMES = [
    { id: "default",          name: "Lost Bookmark",   tagline: "library cream",   swatch: "#c7935a" },
    { id: "porch-light",      name: "Porch Light",     tagline: "warm cream",      swatch: "#c9a96e" },
    { id: "star-chart",       name: "Star Chart",      tagline: "night sky",       swatch: "#fde487" },
    { id: "bedrock",          name: "Bedrock",         tagline: "geological",      swatch: "#d4a574" },
    { id: "hum",              name: "Hum",             tagline: "soft peach",      swatch: "#8a6b8a" },
    { id: "bobblesphere",     name: "Bobblesphere",    tagline: "orbital",         swatch: "#ff9d3c" },
    { id: "library-bookmark", name: "Library Bookmark",tagline: "card catalog",    swatch: "#8b1a1a" },
    { id: "mind-palace-map",  name: "Mind Palace Map", tagline: "antique atlas",   swatch: "#993322" }
  ];
  var STORAGE_KEY = "shelf-theme";

  var panel = document.getElementById("shelfThemePanel");
  THEMES.forEach(function (t) {
    var item = document.createElement("div");
    item.className = "shelf-theme-item";
    item.setAttribute("data-theme-id", t.id);
    item.setAttribute("role", "option");
    item.innerHTML =
      '<span class="shelf-swatch" style="background:' + t.swatch + '"></span>' +
      '<span class="shelf-name">' + t.name + '</span>' +
      '<span class="shelf-tagline">' + t.tagline + '</span>';
    panel.appendChild(item);
  });

  function applyTheme(id) {
    var t = THEMES.find(function (x) { return x.id === id; }) || THEMES[0];
    if (t.id === "default") {
      document.documentElement.removeAttribute("data-theme");
    } else {
      document.documentElement.setAttribute("data-theme", t.id);
    }
    document.getElementById("shelfToggleLabel").textContent = t.name;
    document.getElementById("shelfToggleSwatch").style.background = t.swatch;
    panel.querySelectorAll(".shelf-theme-item").forEach(function (el) {
      el.classList.toggle("active", el.getAttribute("data-theme-id") === t.id);
    });
    try { localStorage.setItem(STORAGE_KEY, t.id); } catch (e) {}
  }

  var initial = "star-chart";
  try { initial = localStorage.getItem(STORAGE_KEY) || "star-chart"; } catch (e) {}
  applyTheme(initial);

  var btn = document.getElementById("shelfThemeToggle");
  function openPanel() { panel.classList.add("open"); btn.setAttribute("aria-expanded", "true"); }
  function closePanel() { panel.classList.remove("open"); btn.setAttribute("aria-expanded", "false"); }
  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    panel.classList.contains("open") ? closePanel() : openPanel();
  });

  panel.addEventListener("click", function (e) {
    var item = e.target.closest(".shelf-theme-item");
    if (!item) return;
    applyTheme(item.getAttribute("data-theme-id"));
    closePanel();
  });

  document.addEventListener("click", function () { closePanel(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closePanel();
  });
})();
</script>
